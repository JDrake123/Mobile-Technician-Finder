<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/c61a0110d8.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="Style.css">
    <script src="App.js" defer></script>
    <title>Phone Repair</title>
</head>
<body>
    <section class="heroSection">
        <!-- Navigation -->
        <div id="Navbar">
            <img src="Icons/Website logo.png" id="Website-logo">
            <span id="links">
                <a href="#" class="link">Home</a>
                <a href="#" class="link">Maps</a>
                <a href="#" class="link">Pricing</a>
                <a href="#" class="link">Contact</a>
            </span>
        </div>
        <!-- Hero section -->
        <div id="heroBody">
            <span id="heroHeading">
               <h2>Find a mobile technician near you</h2>
            </span>
            <span id="heroParagraph">
               <p>It has never been simpler to find a mobile technician near you with just a click of a button</p>
            </span>
            <button id="technicianBtn">Find Technician <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </section>
    <!-- Icon Section -->
        <div id="image">
            <span>
                <img src="Icons/Phone repair icon.png" alt="Phone image">
                <p style="margin-right: 20px;">Phones</p>
            </span>
            <span>
                <img src="Icons/Tablet repair icon.png" alt="Tablet image">
                <p>Tablets</p>
            </span>
            <span>
                <img src="Icons/Laptop repair icon4.png" alt="Laptop image">
                <p>Laptops</p>
            </span>
        </div>
</body>
</html>
